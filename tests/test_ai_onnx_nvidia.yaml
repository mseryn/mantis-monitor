# mantis-monitor — AI benchmark: ONNX Runtime inference, NVIDIA GPU.
#
# Workload : ResNet-50 inference loop on the CUDA execution provider, driven
#            by tests/ai_workloads/onnx_infer_bench.py.
# Collectors: perf (host CPU counters) + bpf (IO latency) +
#             utilization (pfs) + nvidia (GPU telemetry via nvidia-smi).
#
# Install instructions:        see SETUP_AI.md  (ONNX Runtime, onnxruntime-gpu).
# Collector permission setup:  see SETUP.md (perf+BPF+pfs) and
#                              SETUP_GPU.md (nvidia-smi).
#
# Requires `pip install onnxruntime-gpu` (CUDA execution provider).
# Paths are relative to the directory you launch mantis-monitor from.

benchmarks:
  - type: generic_benchmark
    name: onnx_resnet50_nvidia
    cmd: "python3 tests/ai_workloads/onnx_infer_bench.py --model models/resnet50-v1-7.onnx --provider cuda --runs 500"

collection_modes:
  perf:
    pmu_count: 4
  bpf:
    metrics:
      - io_latency
  utilization:
    - memory_info
  nvidia:
    gen: 8
    modes:
      - power_time
      - utilization_time
      - memory_basic_time
      - temperature_time
      - clocks_time

perf_counters:
  - cpu-cycles
  - instructions
  - cache-references
  - cache-misses
  - branch-instructions
  - branch-misses

formatter_modes:
  - CSV

iterations: 1
log: true
time_count: 1000
test_name: test_ai_onnx_nvidia
