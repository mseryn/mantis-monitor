# mantis-monitor — HPC benchmark: CoMD (molecular dynamics), NVIDIA.
#
# Workload : Classical molecular-dynamics proxy (ExMatEx/ECP) integrating a Lennard-Jones or EAM potential. -x/-y/-z set the lattice (atom count).
# Collectors: perf (host CPU counters) + bpf (IO latency) + utilization (pfs) + nvidia (GPU telemetry via nvidia-smi).
#
# Build/run instructions: see SETUP_HPC.md (section "CoMD").
# Collector permissions:  see SETUP.md (perf + BPF + pfs) and SETUP_GPU.md (nvidia).
#
# NOTE: Upstream AMD HIP is via a community fork only; no AMD variant here.
# Run mantis-monitor from the repo root.

benchmarks:
  - type: generic_benchmark
    name: comd_nvidia
    cmd: "./hpc/CoMD-cuda/bin/CoMD-cuda -e -x 40 -y 40 -z 40"

collection_modes:
  perf:
    pmu_count: 4
  bpf:
    metrics:
      - io_latency
  utilization:
    - memory_info
  nvidia:
    gen: 8
    modes:
      - power_time
      - utilization_time
      - memory_basic_time
      - temperature_time
      - clocks_time

perf_counters:
  - cpu-cycles
  - instructions
  - cache-references
  - cache-misses
  - branch-instructions
  - branch-misses

formatter_modes:
  - CSV

iterations: 1
log: true
time_count: 1000
test_name: test_hpc_comd_nvidia
