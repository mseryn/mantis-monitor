# mantis-monitor — HPC benchmark: BabelStream (memory bandwidth (STREAM)), AMD.
#
# Workload : STREAM-style sustained memory-bandwidth kernels (Copy/Mul/Add/Triad/Dot). -s sets array length (elements), -n the repeat count.
# Collectors: perf (host CPU counters) + bpf (IO latency) + utilization (pfs) + rocm (GPU telemetry via rocm-smi).
#
# Build/run instructions: see SETUP_HPC.md (section "BabelStream").
# Collector permissions:  see SETUP.md (perf + BPF + pfs) and SETUP_GPU.md (rocm).
#
# Run mantis-monitor from the repo root.

benchmarks:
  - type: generic_benchmark
    name: babelstream_amd
    cmd: "./hpc/BabelStream/build-hip/hip-stream -s 67108864 -n 100"

collection_modes:
  perf:
    pmu_count: 4
  bpf:
    metrics:
      - io_latency
  utilization:
    - memory_info
  rocm:
    metrics:
      - temperature
      - power
      - use
      - clock
      - voltage

perf_counters:
  - cpu-cycles
  - instructions
  - cache-references
  - cache-misses
  - branch-instructions
  - branch-misses

formatter_modes:
  - CSV

iterations: 1
log: true
time_count: 1000
test_name: test_hpc_babelstream_amd
