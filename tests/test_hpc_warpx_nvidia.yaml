# mantis-monitor — HPC benchmark: WarpX (plasma physics / particle-in-cell), NVIDIA.
#
# Workload : Electromagnetic particle-in-cell plasma/accelerator code (AMReX). Runs a laser-acceleration example; max_step caps the timesteps for a short run.
# Collectors: perf (host CPU counters) + bpf (IO latency) + utilization (pfs) + nvidia (GPU telemetry via nvidia-smi).
#
# Build/run instructions: see SETUP_HPC.md (section "WarpX").
# Collector permissions:  see SETUP.md (perf + BPF + pfs) and SETUP_GPU.md (nvidia).
#
# Run mantis-monitor from the repo root.

benchmarks:
  - type: generic_benchmark
    name: warpx_nvidia
    cmd: "./hpc/WarpX/build-cuda/bin/warpx.3d ./hpc/WarpX/Examples/Physics_applications/laser_acceleration/inputs_base_3d max_step=20"

collection_modes:
  perf:
    pmu_count: 4
  bpf:
    metrics:
      - io_latency
  utilization:
    - memory_info
  nvidia:
    gen: 8
    modes:
      - power_time
      - utilization_time
      - memory_basic_time
      - temperature_time
      - clocks_time

perf_counters:
  - cpu-cycles
  - instructions
  - cache-references
  - cache-misses
  - branch-instructions
  - branch-misses

formatter_modes:
  - CSV

iterations: 1
log: true
time_count: 1000
test_name: test_hpc_warpx_nvidia
