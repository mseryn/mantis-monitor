# mantis-monitor — HPC benchmark: Laghos (hydrodynamics / high-order FE), AMD.
#
# Workload : High-order FE Lagrangian hydrodynamics on the HIP device
#            (-d hip), requires MFEM/Laghos built with HIP.
# Collectors: perf (host CPU counters) + bpf (IO latency) +
#             utilization (pfs) + rocm (GPU telemetry via rocm-smi).
#
# Build/run instructions: see SETUP_HPC.md (section "Laghos").
# Collector permissions:  see SETUP.md (perf+BPF+pfs) and SETUP_GPU.md (rocm).
#
# Run mantis-monitor from the repo root.

benchmarks:
  - type: generic_benchmark
    name: laghos_hip_amd
    cmd: "./hpc/Laghos/build-hip/laghos -p 0 -m ./hpc/Laghos/data/square01_quad.mesh -rs 4 -tf 0.2 -d hip"

collection_modes:
  perf:
    pmu_count: 4
  bpf:
    metrics:
      - io_latency
  utilization:
    - memory_info
  rocm:
    metrics:
      - temperature
      - power
      - use
      - clock
      - voltage

perf_counters:
  - cpu-cycles
  - instructions
  - cache-references
  - cache-misses
  - branch-instructions
  - branch-misses

formatter_modes:
  - CSV

iterations: 1
log: true
time_count: 1000
test_name: test_hpc_laghos_amd
