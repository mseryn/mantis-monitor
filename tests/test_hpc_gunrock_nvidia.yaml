# mantis-monitor — HPC benchmark: Gunrock (graph analytics (GPU)), NVIDIA.
#
# Workload : GPU graph-analytics breadth-first search (Gunrock) over a Matrix-Market graph. CUDA only.
# Collectors: perf (host CPU counters) + bpf (IO latency) + utilization (pfs) + nvidia (GPU telemetry via nvidia-smi).
#
# Build/run instructions: see SETUP_HPC.md (section "Gunrock").
# Collector permissions:  see SETUP.md (perf + BPF + pfs) and SETUP_GPU.md (nvidia).
#
# NOTE: Gunrock is a CUDA GPU library — NVIDIA variant only.
# Run mantis-monitor from the repo root.

benchmarks:
  - type: generic_benchmark
    name: gunrock_nvidia
    cmd: "./hpc/gunrock/build/bin/bfs market ./hpc/gunrock/datasets/chesapeake/chesapeake.mtx"

collection_modes:
  perf:
    pmu_count: 4
  bpf:
    metrics:
      - io_latency
  utilization:
    - memory_info
  nvidia:
    gen: 8
    modes:
      - power_time
      - utilization_time
      - memory_basic_time
      - temperature_time
      - clocks_time

perf_counters:
  - cpu-cycles
  - instructions
  - cache-references
  - cache-misses
  - branch-instructions
  - branch-misses

formatter_modes:
  - CSV

iterations: 1
log: true
time_count: 1000
test_name: test_hpc_gunrock_nvidia
