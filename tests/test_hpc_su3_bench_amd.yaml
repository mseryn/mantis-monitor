# mantis-monitor — HPC benchmark: su3_bench (particle physics / lattice QCD), AMD.
#
# Workload : Lattice-QCD SU(3) matrix-matrix multiply microbenchmark (NERSC), the dominant kernel in MILC/Grid. Separate binary per backend.
# Collectors: perf (host CPU counters) + bpf (IO latency) + utilization (pfs) + rocm (GPU telemetry via rocm-smi).
#
# Build/run instructions: see SETUP_HPC.md (section "su3_bench").
# Collector permissions:  see SETUP.md (perf + BPF + pfs) and SETUP_GPU.md (rocm).
#
# Run mantis-monitor from the repo root.

benchmarks:
  - type: generic_benchmark
    name: su3_bench_amd
    cmd: "./hpc/su3_bench/su3_bench_hip"

collection_modes:
  perf:
    pmu_count: 4
  bpf:
    metrics:
      - io_latency
  utilization:
    - memory_info
  rocm:
    metrics:
      - temperature
      - power
      - use
      - clock
      - voltage

perf_counters:
  - cpu-cycles
  - instructions
  - cache-references
  - cache-misses
  - branch-instructions
  - branch-misses

formatter_modes:
  - CSV

iterations: 1
log: true
time_count: 1000
test_name: test_hpc_su3_bench_amd
