# mantis-monitor — HPC benchmark: miniWeather (climate / atmospheric dynamics), NVIDIA.
#
# Workload : Mini-app simulating 2D compressible, stratified atmospheric fluid dynamics (weather-like). Problem size and sim time are compile-time / env settings.
# Collectors: perf (host CPU counters) + bpf (IO latency) + utilization (pfs) + nvidia (GPU telemetry via nvidia-smi).
#
# Build/run instructions: see SETUP_HPC.md (section "miniWeather").
# Collector permissions:  see SETUP.md (perf + BPF + pfs) and SETUP_GPU.md (nvidia).
#
# Run mantis-monitor from the repo root.

benchmarks:
  - type: generic_benchmark
    name: miniweather_nvidia
    cmd: "./hpc/miniWeather/build/openacc"

collection_modes:
  perf:
    pmu_count: 4
  bpf:
    metrics:
      - io_latency
  utilization:
    - memory_info
  nvidia:
    gen: 8
    modes:
      - power_time
      - utilization_time
      - memory_basic_time
      - temperature_time
      - clocks_time

perf_counters:
  - cpu-cycles
  - instructions
  - cache-references
  - cache-misses
  - branch-instructions
  - branch-misses

formatter_modes:
  - CSV

iterations: 1
log: true
time_count: 1000
test_name: test_hpc_miniweather_nvidia
