# mantis-monitor — HPC benchmark: LULESH (hydrodynamics / shock hydro), CPU.
#
# Workload : Livermore Unstructured Lagrangian Explicit Shock Hydrodynamics
#            (LLNL), OpenMP build. -s sets mesh edge size, -i iteration count.
# Collectors: perf (CPU counters) + bpf (IO latency) + utilization (pfs).
#
# Build/run instructions: see SETUP_HPC.md (section "LULESH").
# Collector permissions:  see SETUP.md (perf + BPF + pfs).
#
# NOTE: No first-class HIP backend upstream, so no AMD variant (per the matrix).
# Run mantis-monitor from the repo root.

benchmarks:
  - type: generic_benchmark
    name: lulesh_omp_cpu
    cmd: "./hpc/LULESH/build-omp/lulesh2.0 -s 30 -i 100"

collection_modes:
  perf:
    pmu_count: 4
  bpf:
    metrics:
      - io_latency
  utilization:
    - memory_info

perf_counters:
  - cpu-cycles
  - instructions
  - cache-references
  - cache-misses
  - branch-instructions
  - branch-misses

formatter_modes:
  - CSV

iterations: 1
log: true
time_count: 1000
test_name: test_hpc_lulesh_cpu
