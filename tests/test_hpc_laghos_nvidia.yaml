# mantis-monitor — HPC benchmark: Laghos (hydrodynamics / high-order FE), NVIDIA.
#
# Workload : High-order FE Lagrangian hydrodynamics on the CUDA device
#            (-d cuda), requires MFEM/Laghos built with CUDA.
# Collectors: perf (host CPU counters) + bpf (IO latency) +
#             utilization (pfs) + nvidia (GPU telemetry via nvidia-smi).
#
# Build/run instructions: see SETUP_HPC.md (section "Laghos").
# Collector permissions:  see SETUP.md (perf+BPF+pfs) and SETUP_GPU.md (nvidia).
#
# Run mantis-monitor from the repo root.

benchmarks:
  - type: generic_benchmark
    name: laghos_cuda_nvidia
    cmd: "./hpc/Laghos/build-cuda/laghos -p 0 -m ./hpc/Laghos/data/square01_quad.mesh -rs 4 -tf 0.2 -d cuda"

collection_modes:
  perf:
    pmu_count: 4
  bpf:
    metrics:
      - io_latency
  utilization:
    - memory_info
  nvidia:
    gen: 8
    modes:
      - power_time
      - utilization_time
      - memory_basic_time
      - temperature_time
      - clocks_time

perf_counters:
  - cpu-cycles
  - instructions
  - cache-references
  - cache-misses
  - branch-instructions
  - branch-misses

formatter_modes:
  - CSV

iterations: 1
log: true
time_count: 1000
test_name: test_hpc_laghos_nvidia
