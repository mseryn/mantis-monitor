# mantis-monitor — HPC benchmark: PENNANT (hydrodynamics / unstructured Lagrangian), CPU.
#
# Workload : Unstructured-mesh staggered-grid Lagrangian hydrodynamics mini-app
#            (LANL), OpenMP build. Reads a .pnt problem deck.
# Collectors: perf (CPU counters) + bpf (IO latency) + utilization (pfs).
#
# Build/run instructions: see SETUP_HPC.md (section "PENNANT").
# Collector permissions:  see SETUP.md (perf + BPF + pfs).
#
# NOTE: No first-class HIP backend upstream, so no AMD variant (per the matrix).
# Run mantis-monitor from the repo root. Pick a larger deck for a longer run.

benchmarks:
  - type: generic_benchmark
    name: pennant_omp_cpu
    cmd: "./hpc/PENNANT/build-omp/pennant ./hpc/PENNANT/test/leblanc/leblanc.pnt"

collection_modes:
  perf:
    pmu_count: 4
  bpf:
    metrics:
      - io_latency
  utilization:
    - memory_info

perf_counters:
  - cpu-cycles
  - instructions
  - cache-references
  - cache-misses
  - branch-instructions
  - branch-misses

formatter_modes:
  - CSV

iterations: 1
log: true
time_count: 1000
test_name: test_hpc_pennant_cpu
