# mantis-monitor — HPC benchmark: miniBUDE (bioinformatics / molecular docking), NVIDIA.
#
# Workload : Bristol University Docking Engine kernel — compute-bound molecular docking pose scoring. --deck selects the input; -i sets iterations.
# Collectors: perf (host CPU counters) + bpf (IO latency) + utilization (pfs) + nvidia (GPU telemetry via nvidia-smi).
#
# Build/run instructions: see SETUP_HPC.md (section "miniBUDE").
# Collector permissions:  see SETUP.md (perf + BPF + pfs) and SETUP_GPU.md (nvidia).
#
# Run mantis-monitor from the repo root.

benchmarks:
  - type: generic_benchmark
    name: minibude_nvidia
    cmd: "./hpc/miniBUDE/build-cuda/bude --deck ./hpc/miniBUDE/data/bm1 -i 8"

collection_modes:
  perf:
    pmu_count: 4
  bpf:
    metrics:
      - io_latency
  utilization:
    - memory_info
  nvidia:
    gen: 8
    modes:
      - power_time
      - utilization_time
      - memory_basic_time
      - temperature_time
      - clocks_time

perf_counters:
  - cpu-cycles
  - instructions
  - cache-references
  - cache-misses
  - branch-instructions
  - branch-misses

formatter_modes:
  - CSV

iterations: 1
log: true
time_count: 1000
test_name: test_hpc_minibude_nvidia
