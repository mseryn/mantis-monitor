# mantis-monitor — AI benchmark: MLPerf Inference (MLCommons), AMD GPU.
#
# Workload : MLPerf Inference ResNet-50, Offline scenario, reference
#            implementation on an AMD GPU (ROCm), driven by MLCommons CM.
# Collectors: perf (host CPU counters) + bpf (IO latency) +
#             utilization (pfs) + rocm (GPU telemetry via rocm-smi).
#
# Install instructions:        see SETUP_AI.md  (MLPerf Inference, ROCm).
# Collector permission setup:  see SETUP.md (perf+BPF+pfs) and
#                              SETUP_GPU.md (rocm-smi).
#
# IMPORTANT: Warm the CM cache first (see SETUP_AI.md).
#
# CAVEAT: AMD/ROCm support in the MLPerf *reference* implementation is limited
# and version-dependent — it generally runs through the onnxruntime ROCm
# execution provider. If --device=rocm is not accepted by your MLPerf/CM
# version, fall back to the ONNX Runtime test (test_ai_onnx_amd.yaml) for a
# reliable AMD GPU AI workload, or consult current MLCommons docs for the
# supported AMD path.

benchmarks:
  - type: generic_benchmark
    name: mlperf_resnet50_amd
    cmd: "cm run script --tags=run-mlperf,inference,_performance-only --model=resnet50 --implementation=reference --framework=onnxruntime --category=edge --scenario=Offline --device=rocm --quiet --rerun"

collection_modes:
  perf:
    pmu_count: 4
  bpf:
    metrics:
      - io_latency
  utilization:
    - memory_info
  rocm:
    metrics:
      - temperature
      - power
      - use
      - clock
      - voltage

perf_counters:
  - cpu-cycles
  - instructions
  - cache-references
  - cache-misses
  - branch-instructions
  - branch-misses

formatter_modes:
  - CSV

iterations: 1
log: true
time_count: 1000
test_name: test_ai_mlperf_amd
