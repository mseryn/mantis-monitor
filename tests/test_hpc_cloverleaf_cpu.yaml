# mantis-monitor — HPC benchmark: CloverLeaf (hydrodynamics / compressible Euler), CPU.
#
# Workload : Structured-grid compressible Euler hydrodynamics mini-app
#            (UoB-HPC port), OpenMP backend. Reads a short input deck.
# Collectors: perf (CPU counters) + bpf (IO latency) + utilization (pfs).
#
# Build/run instructions: see SETUP_HPC.md (section "CloverLeaf / TeaLeaf").
# Collector permissions:  see SETUP.md (perf + BPF + pfs).
#
# Run mantis-monitor from the repo root. Swap the input deck for a longer run.

benchmarks:
  - type: generic_benchmark
    name: cloverleaf_omp_cpu
    cmd: "./hpc/CloverLeaf/build-omp/clover_leaf --file ./hpc/CloverLeaf/InputDecks/clover_bm_short.in"

collection_modes:
  perf:
    pmu_count: 4
  bpf:
    metrics:
      - io_latency
  utilization:
    - memory_info

perf_counters:
  - cpu-cycles
  - instructions
  - cache-references
  - cache-misses
  - branch-instructions
  - branch-misses

formatter_modes:
  - CSV

iterations: 1
log: true
time_count: 1000
test_name: test_hpc_cloverleaf_cpu
