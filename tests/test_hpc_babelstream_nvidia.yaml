# mantis-monitor — HPC benchmark: BabelStream (memory bandwidth (STREAM)), NVIDIA.
#
# Workload : STREAM-style sustained memory-bandwidth kernels (Copy/Mul/Add/Triad/Dot). -s sets array length (elements), -n the repeat count.
# Collectors: perf (host CPU counters) + bpf (IO latency) + utilization (pfs) + nvidia (GPU telemetry via nvidia-smi).
#
# Build/run instructions: see SETUP_HPC.md (section "BabelStream").
# Collector permissions:  see SETUP.md (perf + BPF + pfs) and SETUP_GPU.md (nvidia).
#
# Run mantis-monitor from the repo root.

benchmarks:
  - type: generic_benchmark
    name: babelstream_nvidia
    cmd: "./hpc/BabelStream/build-cuda/cuda-stream -s 67108864 -n 100"

collection_modes:
  perf:
    pmu_count: 4
  bpf:
    metrics:
      - io_latency
  utilization:
    - memory_info
  nvidia:
    gen: 8
    modes:
      - power_time
      - utilization_time
      - memory_basic_time
      - temperature_time
      - clocks_time

perf_counters:
  - cpu-cycles
  - instructions
  - cache-references
  - cache-misses
  - branch-instructions
  - branch-misses

formatter_modes:
  - CSV

iterations: 1
log: true
time_count: 1000
test_name: test_hpc_babelstream_nvidia
