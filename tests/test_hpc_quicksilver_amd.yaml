# mantis-monitor — HPC benchmark: Quicksilver (MC particle transport), AMD.
#
# Workload : Monte Carlo particle transport proxy on the HIP build, reduced
#            particle count for a short run.
# Collectors: perf (host CPU counters) + bpf (IO latency) +
#             utilization (pfs) + rocm (GPU telemetry via rocm-smi).
#
# Build/run instructions: see SETUP_HPC.md (section "Quicksilver").
# Collector permissions:  see SETUP.md (perf+BPF+pfs) and SETUP_GPU.md (rocm).
#
# Requires the HIP build of Quicksilver. Run mantis-monitor from the repo root.

benchmarks:
  - type: generic_benchmark
    name: quicksilver_hip_amd
    cmd: "./hpc/Quicksilver/build-hip/qs -i ./hpc/Quicksilver/Examples/AllScattering/scatteringOnly.inp -n 100000"

collection_modes:
  perf:
    pmu_count: 4
  bpf:
    metrics:
      - io_latency
  utilization:
    - memory_info
  rocm:
    metrics:
      - temperature
      - power
      - use
      - clock
      - voltage

perf_counters:
  - cpu-cycles
  - instructions
  - cache-references
  - cache-misses
  - branch-instructions
  - branch-misses

formatter_modes:
  - CSV

iterations: 1
log: true
time_count: 1000
test_name: test_hpc_quicksilver_amd
