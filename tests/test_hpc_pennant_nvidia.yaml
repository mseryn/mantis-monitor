# mantis-monitor — HPC benchmark: PENNANT (hydrodynamics / unstructured Lagrangian), NVIDIA.
#
# Workload : Unstructured Lagrangian hydrodynamics on the CUDA build.
# Collectors: perf (host CPU counters) + bpf (IO latency) +
#             utilization (pfs) + nvidia (GPU telemetry via nvidia-smi).
#
# Build/run instructions: see SETUP_HPC.md (section "PENNANT").
# Collector permissions:  see SETUP.md (perf+BPF+pfs) and SETUP_GPU.md (nvidia).
#
# Requires the CUDA PENNANT build. Run mantis-monitor from the repo root.

benchmarks:
  - type: generic_benchmark
    name: pennant_cuda_nvidia
    cmd: "./hpc/PENNANT/build-cuda/pennant ./hpc/PENNANT/test/leblanc/leblanc.pnt"

collection_modes:
  perf:
    pmu_count: 4
  bpf:
    metrics:
      - io_latency
  utilization:
    - memory_info
  nvidia:
    gen: 8
    modes:
      - power_time
      - utilization_time
      - memory_basic_time
      - temperature_time
      - clocks_time

perf_counters:
  - cpu-cycles
  - instructions
  - cache-references
  - cache-misses
  - branch-instructions
  - branch-misses

formatter_modes:
  - CSV

iterations: 1
log: true
time_count: 1000
test_name: test_hpc_pennant_nvidia
