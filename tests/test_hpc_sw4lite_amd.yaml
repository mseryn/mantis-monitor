# mantis-monitor — HPC benchmark: SW4lite (seismology / wave propagation), AMD.
#
# Workload : Numerical kernel of SW4 (seismic wave propagation, geodynamics) — 3D finite-difference elastic wave update. Reads a small point-source input deck.
# Collectors: perf (host CPU counters) + bpf (IO latency) + utilization (pfs) + rocm (GPU telemetry via rocm-smi).
#
# Build/run instructions: see SETUP_HPC.md (section "SW4lite").
# Collector permissions:  see SETUP.md (perf + BPF + pfs) and SETUP_GPU.md (rocm).
#
# Run mantis-monitor from the repo root.

benchmarks:
  - type: generic_benchmark
    name: sw4lite_amd
    cmd: "./hpc/sw4lite/optimize_hip/sw4lite ./hpc/sw4lite/tests/pointsource/pointsource.in"

collection_modes:
  perf:
    pmu_count: 4
  bpf:
    metrics:
      - io_latency
  utilization:
    - memory_info
  rocm:
    metrics:
      - temperature
      - power
      - use
      - clock
      - voltage

perf_counters:
  - cpu-cycles
  - instructions
  - cache-references
  - cache-misses
  - branch-instructions
  - branch-misses

formatter_modes:
  - CSV

iterations: 1
log: true
time_count: 1000
test_name: test_hpc_sw4lite_amd
