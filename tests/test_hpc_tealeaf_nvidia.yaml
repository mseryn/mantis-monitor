# mantis-monitor — HPC benchmark: TeaLeaf (heat conduction / CG solver), NVIDIA.
#
# Workload : Linear heat-conduction mini-app (UoB-HPC port) solving an implicit sparse system each step with a conjugate-gradient solver.
# Collectors: perf (host CPU counters) + bpf (IO latency) + utilization (pfs) + nvidia (GPU telemetry via nvidia-smi).
#
# Build/run instructions: see SETUP_HPC.md (section "CloverLeaf / TeaLeaf").
# Collector permissions:  see SETUP.md (perf + BPF + pfs) and SETUP_GPU.md (nvidia).
#
# Run mantis-monitor from the repo root.

benchmarks:
  - type: generic_benchmark
    name: tealeaf_nvidia
    cmd: "./hpc/TeaLeaf/build-cuda/tealeaf --file ./hpc/TeaLeaf/InputDecks/tea_bm_short.in"

collection_modes:
  perf:
    pmu_count: 4
  bpf:
    metrics:
      - io_latency
  utilization:
    - memory_info
  nvidia:
    gen: 8
    modes:
      - power_time
      - utilization_time
      - memory_basic_time
      - temperature_time
      - clocks_time

perf_counters:
  - cpu-cycles
  - instructions
  - cache-references
  - cache-misses
  - branch-instructions
  - branch-misses

formatter_modes:
  - CSV

iterations: 1
log: true
time_count: 1000
test_name: test_hpc_tealeaf_nvidia
