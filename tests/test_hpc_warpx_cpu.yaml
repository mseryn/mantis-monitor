# mantis-monitor — HPC benchmark: WarpX (plasma physics / particle-in-cell), CPU.
#
# Workload : Electromagnetic particle-in-cell plasma/accelerator code (AMReX). Runs a laser-acceleration example; max_step caps the timesteps for a short run.
# Collectors: perf (CPU counters) + bpf (IO latency) + utilization (pfs).
#
# Build/run instructions: see SETUP_HPC.md (section "WarpX").
# Collector permissions:  see SETUP.md (perf + BPF + pfs).
#
# Run mantis-monitor from the repo root.

benchmarks:
  - type: generic_benchmark
    name: warpx_cpu
    cmd: "./hpc/WarpX/build-omp/bin/warpx.3d ./hpc/WarpX/Examples/Physics_applications/laser_acceleration/inputs_base_3d max_step=20"

collection_modes:
  perf:
    pmu_count: 4
  bpf:
    metrics:
      - io_latency
  utilization:
    - memory_info

perf_counters:
  - cpu-cycles
  - instructions
  - cache-references
  - cache-misses
  - branch-instructions
  - branch-misses

formatter_modes:
  - CSV

iterations: 1
log: true
time_count: 1000
test_name: test_hpc_warpx_cpu
