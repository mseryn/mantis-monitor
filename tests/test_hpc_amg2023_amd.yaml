# mantis-monitor — HPC benchmark: AMG2023 (algebraic multigrid (HYPRE)), AMD.
#
# Workload : Algebraic multigrid solve on a 3D problem via HYPRE. -n sets the per-process grid; -P the process grid (1x1x1 here).
# Collectors: perf (host CPU counters) + bpf (IO latency) + utilization (pfs) + rocm (GPU telemetry via rocm-smi).
#
# Build/run instructions: see SETUP_HPC.md (section "AMG2023").
# Collector permissions:  see SETUP.md (perf + BPF + pfs) and SETUP_GPU.md (rocm).
#
# Run mantis-monitor from the repo root.

benchmarks:
  - type: generic_benchmark
    name: amg2023_amd
    cmd: "./hpc/AMG2023/build-hip/test/amg -P 1 1 1 -n 128 128 128"

collection_modes:
  perf:
    pmu_count: 4
  bpf:
    metrics:
      - io_latency
  utilization:
    - memory_info
  rocm:
    metrics:
      - temperature
      - power
      - use
      - clock
      - voltage

perf_counters:
  - cpu-cycles
  - instructions
  - cache-references
  - cache-misses
  - branch-instructions
  - branch-misses

formatter_modes:
  - CSV

iterations: 1
log: true
time_count: 1000
test_name: test_hpc_amg2023_amd
