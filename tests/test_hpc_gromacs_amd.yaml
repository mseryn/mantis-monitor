# mantis-monitor — HPC benchmark: GROMACS (molecular dynamics (production app)), AMD.
#
# Workload : Production MD engine running a benchmark .tpr. -nsteps caps the run; -resethway -noconfout keep it short and skip output. -nb selects CPU vs GPU nonbonded.
# Collectors: perf (host CPU counters) + bpf (IO latency) + utilization (pfs) + rocm (GPU telemetry via rocm-smi).
#
# Build/run instructions: see SETUP_HPC.md (section "GROMACS").
# Collector permissions:  see SETUP.md (perf + BPF + pfs) and SETUP_GPU.md (rocm).
#
# Run mantis-monitor from the repo root.

benchmarks:
  - type: generic_benchmark
    name: gromacs_amd
    cmd: "./hpc/gromacs/build-hip/bin/gmx mdrun -s ./hpc/gromacs/bench/benchMEM.tpr -nsteps 20000 -resethway -noconfout -nb gpu"

collection_modes:
  perf:
    pmu_count: 4
  bpf:
    metrics:
      - io_latency
  utilization:
    - memory_info
  rocm:
    metrics:
      - temperature
      - power
      - use
      - clock
      - voltage

perf_counters:
  - cpu-cycles
  - instructions
  - cache-references
  - cache-misses
  - branch-instructions
  - branch-misses

formatter_modes:
  - CSV

iterations: 1
log: true
time_count: 1000
test_name: test_hpc_gromacs_amd
