# mantis-monitor — HPC benchmark: HPCG (sparse iterative solver / multigrid), NVIDIA.
#
# Workload : High Performance Conjugate Gradients — sparse matrix-vector, symmetric Gauss-Seidel smoothing, and a multigrid V-cycle. --rt sets the (short) runtime.
# Collectors: perf (host CPU counters) + bpf (IO latency) + utilization (pfs) + nvidia (GPU telemetry via nvidia-smi).
#
# Build/run instructions: see SETUP_HPC.md (section "HPCG").
# Collector permissions:  see SETUP.md (perf + BPF + pfs) and SETUP_GPU.md (nvidia).
#
# Run mantis-monitor from the repo root.

benchmarks:
  - type: generic_benchmark
    name: hpcg_nvidia
    cmd: "./hpc/hpcg-nvidia/xhpcg --nx=128 --ny=128 --nz=128 --rt=30"

collection_modes:
  perf:
    pmu_count: 4
  bpf:
    metrics:
      - io_latency
  utilization:
    - memory_info
  nvidia:
    gen: 8
    modes:
      - power_time
      - utilization_time
      - memory_basic_time
      - temperature_time
      - clocks_time

perf_counters:
  - cpu-cycles
  - instructions
  - cache-references
  - cache-misses
  - branch-instructions
  - branch-misses

formatter_modes:
  - CSV

iterations: 1
log: true
time_count: 1000
test_name: test_hpc_hpcg_nvidia
