# mantis-monitor — HPC benchmark: miniBUDE (bioinformatics / molecular docking), AMD.
#
# Workload : Bristol University Docking Engine kernel — compute-bound molecular docking pose scoring. --deck selects the input; -i sets iterations.
# Collectors: perf (host CPU counters) + bpf (IO latency) + utilization (pfs) + rocm (GPU telemetry via rocm-smi).
#
# Build/run instructions: see SETUP_HPC.md (section "miniBUDE").
# Collector permissions:  see SETUP.md (perf + BPF + pfs) and SETUP_GPU.md (rocm).
#
# Run mantis-monitor from the repo root.

benchmarks:
  - type: generic_benchmark
    name: minibude_amd
    cmd: "./hpc/miniBUDE/build-hip/bude --deck ./hpc/miniBUDE/data/bm1 -i 8"

collection_modes:
  perf:
    pmu_count: 4
  bpf:
    metrics:
      - io_latency
  utilization:
    - memory_info
  rocm:
    metrics:
      - temperature
      - power
      - use
      - clock
      - voltage

perf_counters:
  - cpu-cycles
  - instructions
  - cache-references
  - cache-misses
  - branch-instructions
  - branch-misses

formatter_modes:
  - CSV

iterations: 1
log: true
time_count: 1000
test_name: test_hpc_minibude_amd
