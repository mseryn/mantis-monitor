# Example mantis-monitor configuration for the NVIDIA SMI (NVIDIA GPU) Collector.
#
# The NVIDIA collector samples GPU telemetry using `nvidia-smi`'s built-in
# `--query-gpu ... --loop-ms` streaming mode while the benchmark runs.  Each
# requested `mode` maps to one nvidia-smi query and produces per-GPU
# time-series.
#
# Prerequisites
# -------------
#   * An NVIDIA GPU with a working driver.
#   * `nvidia-smi` on PATH (verify with `nvidia-smi`).
#   * No elevated privileges required for the SMI query modes below.
#   * The optional `gpu_trace` mode additionally requires NVIDIA Nsight Systems
#     (`nsys`) and is left disabled by default — see the note at the bottom.
#
# Modes and the metrics they collect
# ----------------------------------
#   power_time         — power.draw                                   (W)
#   utilization_time   — utilization.gpu, utilization.memory          (%)
#   memory_basic_time  — memory.total, memory.used, memory.free       (MiB)
#   temperature_time   — temperature.gpu, temperature.memory          (C)
#   clocks_time        — clocks.current.graphics/sm/memory/video      (MHz)
#
# Each produces keys named `gpu_<index>_<query_field>`, e.g.
#   gpu_0_power.draw, gpu_0_utilization.gpu, gpu_0_temperature.gpu
#
# About the benchmark below
# -------------------------
#   The default workload just keeps the process alive for ~6 seconds so the
#   collector captures several samples of (likely idle) GPU telemetry — enough
#   to confirm the collector works end to end.
#
#   To see real GPU ACTIVITY, replace `cmd` with an actual GPU workload, e.g.:
#     cmd: "./my_cuda_app"
#     cmd: "python3 -c \"import torch; x=torch.randn(8000,8000,device='cuda'); [x@x for _ in range(50)]\""
#   Aim for a workload that runs at least a few seconds.

benchmarks:
  - type: generic_benchmark
    name: gpu_idle_probe
    # Replace with a real GPU workload to see activity (see note above).
    cmd: "python3 -c \"import time; time.sleep(6)\""

collection_modes:
  nvidia:
    # `gen` records the GPU's compute-capability / SM generation.  It is stored
    # for provenance; set it to whatever matches your card (e.g. 7, 8, 9).
    gen: 8
    modes:
      - power_time
      - utilization_time
      - memory_basic_time
      - temperature_time
      - clocks_time
      # - gpu_trace        # requires `nsys` (Nsight Systems); disabled by default

formatter_modes:
  - CSV

iterations: 1
log: true
time_count: 1000
test_name: test_nvidia
