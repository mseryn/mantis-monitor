# mantis-monitor — HPC benchmark: Laghos (hydrodynamics / high-order FE), CPU.
#
# Workload : High-order finite-element Lagrangian hydrodynamics (CEED/MFEM),
#            CPU device. -rs refines the mesh, -tf sets final time.
# Collectors: perf (CPU counters) + bpf (IO latency) + utilization (pfs).
#
# Build/run instructions: see SETUP_HPC.md (section "Laghos").
# Collector permissions:  see SETUP.md (perf + BPF + pfs).
#
# Run mantis-monitor from the repo root. Raise -rs / -tf for a longer run.

benchmarks:
  - type: generic_benchmark
    name: laghos_cpu
    cmd: "./hpc/Laghos/build-cpu/laghos -p 0 -m ./hpc/Laghos/data/square01_quad.mesh -rs 3 -tf 0.2 -d cpu"

collection_modes:
  perf:
    pmu_count: 4
  bpf:
    metrics:
      - io_latency
  utilization:
    - memory_info

perf_counters:
  - cpu-cycles
  - instructions
  - cache-references
  - cache-misses
  - branch-instructions
  - branch-misses

formatter_modes:
  - CSV

iterations: 1
log: true
time_count: 1000
test_name: test_hpc_laghos_cpu
