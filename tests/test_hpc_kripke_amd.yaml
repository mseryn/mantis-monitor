# mantis-monitor — HPC benchmark: Kripke (deterministic Sn transport), AMD.
#
# Workload : Sn transport mini-app on the HIP backend (RAJA), selected at
#            runtime via --arch HIP.
# Collectors: perf (host CPU counters) + bpf (IO latency) +
#             utilization (pfs) + rocm (GPU telemetry via rocm-smi).
#
# Build/run instructions: see SETUP_HPC.md (section "Kripke").
# Collector permissions:  see SETUP.md (perf+BPF+pfs) and SETUP_GPU.md (rocm).
#
# Requires Kripke built with HIP. Run mantis-monitor from the repo root.

benchmarks:
  - type: generic_benchmark
    name: kripke_hip_amd
    cmd: "./hpc/Kripke/build-hip/kripke.exe --arch HIP --zones 32,32,32 --niter 10"

collection_modes:
  perf:
    pmu_count: 4
  bpf:
    metrics:
      - io_latency
  utilization:
    - memory_info
  rocm:
    metrics:
      - temperature
      - power
      - use
      - clock
      - voltage

perf_counters:
  - cpu-cycles
  - instructions
  - cache-references
  - cache-misses
  - branch-instructions
  - branch-misses

formatter_modes:
  - CSV

iterations: 1
log: true
time_count: 1000
test_name: test_hpc_kripke_amd
