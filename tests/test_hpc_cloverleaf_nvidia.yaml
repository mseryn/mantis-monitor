# mantis-monitor — HPC benchmark: CloverLeaf (hydrodynamics / compressible Euler), NVIDIA.
#
# Workload : Compressible Euler hydrodynamics on the CUDA build.
# Collectors: perf (host CPU counters) + bpf (IO latency) +
#             utilization (pfs) + nvidia (GPU telemetry via nvidia-smi).
#
# Build/run instructions: see SETUP_HPC.md (section "CloverLeaf / TeaLeaf").
# Collector permissions:  see SETUP.md (perf+BPF+pfs) and SETUP_GPU.md (nvidia).
#
# Requires the CUDA build (-DMODEL=cuda). Run mantis-monitor from the repo root.

benchmarks:
  - type: generic_benchmark
    name: cloverleaf_cuda_nvidia
    cmd: "./hpc/CloverLeaf/build-cuda/clover_leaf --file ./hpc/CloverLeaf/InputDecks/clover_bm_short.in"

collection_modes:
  perf:
    pmu_count: 4
  bpf:
    metrics:
      - io_latency
  utilization:
    - memory_info
  nvidia:
    gen: 8
    modes:
      - power_time
      - utilization_time
      - memory_basic_time
      - temperature_time
      - clocks_time

perf_counters:
  - cpu-cycles
  - instructions
  - cache-references
  - cache-misses
  - branch-instructions
  - branch-misses

formatter_modes:
  - CSV

iterations: 1
log: true
time_count: 1000
test_name: test_hpc_cloverleaf_nvidia
