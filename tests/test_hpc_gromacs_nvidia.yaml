# mantis-monitor — HPC benchmark: GROMACS (molecular dynamics (production app)), NVIDIA.
#
# Workload : Production MD engine running a benchmark .tpr. -nsteps caps the run; -resethway -noconfout keep it short and skip output. -nb selects CPU vs GPU nonbonded.
# Collectors: perf (host CPU counters) + bpf (IO latency) + utilization (pfs) + nvidia (GPU telemetry via nvidia-smi).
#
# Build/run instructions: see SETUP_HPC.md (section "GROMACS").
# Collector permissions:  see SETUP.md (perf + BPF + pfs) and SETUP_GPU.md (nvidia).
#
# Run mantis-monitor from the repo root.

benchmarks:
  - type: generic_benchmark
    name: gromacs_nvidia
    cmd: "./hpc/gromacs/build-cuda/bin/gmx mdrun -s ./hpc/gromacs/bench/benchMEM.tpr -nsteps 20000 -resethway -noconfout -nb gpu"

collection_modes:
  perf:
    pmu_count: 4
  bpf:
    metrics:
      - io_latency
  utilization:
    - memory_info
  nvidia:
    gen: 8
    modes:
      - power_time
      - utilization_time
      - memory_basic_time
      - temperature_time
      - clocks_time

perf_counters:
  - cpu-cycles
  - instructions
  - cache-references
  - cache-misses
  - branch-instructions
  - branch-misses

formatter_modes:
  - CSV

iterations: 1
log: true
time_count: 1000
test_name: test_hpc_gromacs_nvidia
