# mantis-monitor — HPC benchmark: TeaLeaf (heat conduction / CG solver), AMD.
#
# Workload : Linear heat-conduction mini-app (UoB-HPC port) solving an implicit sparse system each step with a conjugate-gradient solver.
# Collectors: perf (host CPU counters) + bpf (IO latency) + utilization (pfs) + rocm (GPU telemetry via rocm-smi).
#
# Build/run instructions: see SETUP_HPC.md (section "CloverLeaf / TeaLeaf").
# Collector permissions:  see SETUP.md (perf + BPF + pfs) and SETUP_GPU.md (rocm).
#
# Run mantis-monitor from the repo root.

benchmarks:
  - type: generic_benchmark
    name: tealeaf_amd
    cmd: "./hpc/TeaLeaf/build-hip/tealeaf --file ./hpc/TeaLeaf/InputDecks/tea_bm_short.in"

collection_modes:
  perf:
    pmu_count: 4
  bpf:
    metrics:
      - io_latency
  utilization:
    - memory_info
  rocm:
    metrics:
      - temperature
      - power
      - use
      - clock
      - voltage

perf_counters:
  - cpu-cycles
  - instructions
  - cache-references
  - cache-misses
  - branch-instructions
  - branch-misses

formatter_modes:
  - CSV

iterations: 1
log: true
time_count: 1000
test_name: test_hpc_tealeaf_amd
