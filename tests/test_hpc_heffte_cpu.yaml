# mantis-monitor — HPC benchmark: heFFTe (spectral / distributed FFT), CPU.
#
# Workload : Highly Efficient FFT for Exascale — 3D complex-to-complex transform benchmark. Backend (fftw/cufft/rocfft) is the first argument; requires an MPI launcher even for 1 rank.
# Collectors: perf (CPU counters) + bpf (IO latency) + utilization (pfs).
#
# Build/run instructions: see SETUP_HPC.md (section "heFFTe").
# Collector permissions:  see SETUP.md (perf + BPF + pfs).
#
# Run mantis-monitor from the repo root.

benchmarks:
  - type: generic_benchmark
    name: heffte_cpu
    cmd: "mpirun -np 1 ./hpc/heffte/build/benchmarks/speed3d_c2c fftw double 256 256 256"

collection_modes:
  perf:
    pmu_count: 4
  bpf:
    metrics:
      - io_latency
  utilization:
    - memory_info

perf_counters:
  - cpu-cycles
  - instructions
  - cache-references
  - cache-misses
  - branch-instructions
  - branch-misses

formatter_modes:
  - CSV

iterations: 1
log: true
time_count: 1000
test_name: test_hpc_heffte_cpu
