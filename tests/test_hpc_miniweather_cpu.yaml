# mantis-monitor — HPC benchmark: miniWeather (climate / atmospheric dynamics), CPU.
#
# Workload : Mini-app simulating 2D compressible, stratified atmospheric fluid dynamics (weather-like). Problem size and sim time are compile-time / env settings.
# Collectors: perf (CPU counters) + bpf (IO latency) + utilization (pfs).
#
# Build/run instructions: see SETUP_HPC.md (section "miniWeather").
# Collector permissions:  see SETUP.md (perf + BPF + pfs).
#
# Run mantis-monitor from the repo root.

benchmarks:
  - type: generic_benchmark
    name: miniweather_cpu
    cmd: "./hpc/miniWeather/build/openmp"

collection_modes:
  perf:
    pmu_count: 4
  bpf:
    metrics:
      - io_latency
  utilization:
    - memory_info

perf_counters:
  - cpu-cycles
  - instructions
  - cache-references
  - cache-misses
  - branch-instructions
  - branch-misses

formatter_modes:
  - CSV

iterations: 1
log: true
time_count: 1000
test_name: test_hpc_miniweather_cpu
