# mantis-monitor — HPC benchmark: Nekbone (CFD / spectral element), NVIDIA.
#
# Workload : Nekbone spectral-element CG solver on the CUDA build (Nekbone CUDA
#            fork / NekBench).
# Collectors: perf (host CPU counters) + bpf (IO latency) +
#             utilization (pfs) + nvidia (GPU telemetry via nvidia-smi).
#
# Build/run instructions: see SETUP_HPC.md (section "Nekbone").
# Collector permissions:  see SETUP.md (perf+BPF+pfs) and SETUP_GPU.md (nvidia).
#
# Requires a CUDA Nekbone build. Run mantis-monitor from the repo root.

benchmarks:
  - type: generic_benchmark
    name: nekbone_cuda_nvidia
    cmd: "./hpc/Nekbone-cuda/test/nekbone"

collection_modes:
  perf:
    pmu_count: 4
  bpf:
    metrics:
      - io_latency
  utilization:
    - memory_info
  nvidia:
    gen: 8
    modes:
      - power_time
      - utilization_time
      - memory_basic_time
      - temperature_time
      - clocks_time

perf_counters:
  - cpu-cycles
  - instructions
  - cache-references
  - cache-misses
  - branch-instructions
  - branch-misses

formatter_modes:
  - CSV

iterations: 1
log: true
time_count: 1000
test_name: test_hpc_nekbone_nvidia
