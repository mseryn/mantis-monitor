# mantis-monitor — HPC benchmark: XSBench (nuclear / MC neutron transport), AMD.
#
# Workload : Monte Carlo macroscopic cross-section lookup (event-based) on the
#            HIP build, small problem size.
# Collectors: perf (host CPU counters) + bpf (IO latency) +
#             utilization (pfs) + rocm (GPU telemetry via rocm-smi).
#
# Build/run instructions: see SETUP_HPC.md (section "XSBench / RSBench").
# Collector permissions:  see SETUP.md (perf+BPF+pfs) and SETUP_GPU.md (rocm).
#
# Requires the HIP build of XSBench. Run mantis-monitor from the repo root.

benchmarks:
  - type: generic_benchmark
    name: xsbench_hip_amd
    cmd: "./hpc/XSBench/hip/XSBench -m event -s small"

collection_modes:
  perf:
    pmu_count: 4
  bpf:
    metrics:
      - io_latency
  utilization:
    - memory_info
  rocm:
    metrics:
      - temperature
      - power
      - use
      - clock
      - voltage

perf_counters:
  - cpu-cycles
  - instructions
  - cache-references
  - cache-misses
  - branch-instructions
  - branch-misses

formatter_modes:
  - CSV

iterations: 1
log: true
time_count: 1000
test_name: test_hpc_xsbench_amd
