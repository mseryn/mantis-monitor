# mantis-monitor — HPC benchmark: HACCmk (cosmology / N-body kernel), NVIDIA.
#
# Workload : HACC short-force N-body compute kernel (CORAL-2 microkernel) — a compute-bound gravitational short-range force evaluation.
# Collectors: perf (host CPU counters) + bpf (IO latency) + utilization (pfs) + nvidia (GPU telemetry via nvidia-smi).
#
# Build/run instructions: see SETUP_HPC.md (section "HACCmk").
# Collector permissions:  see SETUP.md (perf + BPF + pfs) and SETUP_GPU.md (nvidia).
#
# NOTE: HACCmk is primarily a CPU OpenMP microkernel; the CUDA build is less
# standard (full HACC is heavy). No AMD variant (per matrix).
# Run mantis-monitor from the repo root.

benchmarks:
  - type: generic_benchmark
    name: haccmk_nvidia
    cmd: "./hpc/HACCmk/hacc_cuda.exe"

collection_modes:
  perf:
    pmu_count: 4
  bpf:
    metrics:
      - io_latency
  utilization:
    - memory_info
  nvidia:
    gen: 8
    modes:
      - power_time
      - utilization_time
      - memory_basic_time
      - temperature_time
      - clocks_time

perf_counters:
  - cpu-cycles
  - instructions
  - cache-references
  - cache-misses
  - branch-instructions
  - branch-misses

formatter_modes:
  - CSV

iterations: 1
log: true
time_count: 1000
test_name: test_hpc_haccmk_nvidia
