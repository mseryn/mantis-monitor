# mantis-monitor — HPC benchmark: gapbs (graph analytics), CPU.
#
# Workload : GAP Benchmark Suite breadth-first search on a generated Kronecker graph. -g sets graph scale (2^g vertices), -n the number of trials. CPU/OpenMP only.
# Collectors: perf (CPU counters) + bpf (IO latency) + utilization (pfs).
#
# Build/run instructions: see SETUP_HPC.md (section "gapbs").
# Collector permissions:  see SETUP.md (perf + BPF + pfs).
#
# NOTE: gapbs is a CPU (OpenMP) suite — CPU variant only.
# Run mantis-monitor from the repo root.

benchmarks:
  - type: generic_benchmark
    name: gapbs_cpu
    cmd: "./hpc/gapbs/bfs -g 20 -n 16"

collection_modes:
  perf:
    pmu_count: 4
  bpf:
    metrics:
      - io_latency
  utilization:
    - memory_info

perf_counters:
  - cpu-cycles
  - instructions
  - cache-references
  - cache-misses
  - branch-instructions
  - branch-misses

formatter_modes:
  - CSV

iterations: 1
log: true
time_count: 1000
test_name: test_hpc_gapbs_cpu
