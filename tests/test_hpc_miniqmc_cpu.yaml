# mantis-monitor — HPC benchmark: miniQMC (quantum Monte Carlo / electronic structure), CPU.
#
# Workload : QMCPACK proxy exercising the real-space quantum Monte Carlo hot paths (spline orbitals, Jastrow factors, determinant updates). -g sets the supercell tiling. GPU variant uses the OpenMP-offload build.
# Collectors: perf (CPU counters) + bpf (IO latency) + utilization (pfs).
#
# Build/run instructions: see SETUP_HPC.md (section "miniQMC").
# Collector permissions:  see SETUP.md (perf + BPF + pfs).
#
# NOTE: AMD support is limited/experimental; no AMD variant here (per matrix).
# Run mantis-monitor from the repo root.

benchmarks:
  - type: generic_benchmark
    name: miniqmc_cpu
    cmd: "./hpc/miniqmc/build/bin/miniqmc -g \"2 2 1\""

collection_modes:
  perf:
    pmu_count: 4
  bpf:
    metrics:
      - io_latency
  utilization:
    - memory_info

perf_counters:
  - cpu-cycles
  - instructions
  - cache-references
  - cache-misses
  - branch-instructions
  - branch-misses

formatter_modes:
  - CSV

iterations: 1
log: true
time_count: 1000
test_name: test_hpc_miniqmc_cpu
