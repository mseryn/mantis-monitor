# mantis-monitor — HPC benchmark: RAJAPerf (kernel performance suite), NVIDIA.
#
# Workload : RAJA Performance Suite — dozens of representative kernels (basic, polybench, stream, apps). -v selects the variant; --npasses 1 keeps it short.
# Collectors: perf (host CPU counters) + bpf (IO latency) + utilization (pfs) + nvidia (GPU telemetry via nvidia-smi).
#
# Build/run instructions: see SETUP_HPC.md (section "RAJAPerf").
# Collector permissions:  see SETUP.md (perf + BPF + pfs) and SETUP_GPU.md (nvidia).
#
# Run mantis-monitor from the repo root.

benchmarks:
  - type: generic_benchmark
    name: rajaperf_nvidia
    cmd: "./hpc/RAJAPerf/build-cuda/bin/raja-perf.exe -v Base_CUDA --npasses 1"

collection_modes:
  perf:
    pmu_count: 4
  bpf:
    metrics:
      - io_latency
  utilization:
    - memory_info
  nvidia:
    gen: 8
    modes:
      - power_time
      - utilization_time
      - memory_basic_time
      - temperature_time
      - clocks_time

perf_counters:
  - cpu-cycles
  - instructions
  - cache-references
  - cache-misses
  - branch-instructions
  - branch-misses

formatter_modes:
  - CSV

iterations: 1
log: true
time_count: 1000
test_name: test_hpc_rajaperf_nvidia
