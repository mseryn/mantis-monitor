# mantis-monitor — HPC benchmark: SNAP (deterministic Sn transport), NVIDIA.
#
# Workload : SNAP SN transport proxy on the GPU build (OpenACC/CUDA offload).
# Collectors: perf (host CPU counters) + bpf (IO latency) +
#             utilization (pfs) + nvidia (GPU telemetry via nvidia-smi).
#
# Build/run instructions: see SETUP_HPC.md (section "SNAP").
# Collector permissions:  see SETUP.md (perf+BPF+pfs) and SETUP_GPU.md (nvidia).
#
# Requires the OpenACC/CUDA GPU build of SNAP (built with an NVHPC/PGI compiler).
# Run mantis-monitor from the repo root.

benchmarks:
  - type: generic_benchmark
    name: snap_acc_nvidia
    cmd: "./hpc/SNAP/src-acc/snap ./hpc/SNAP/inputs/small.inp snap_gpu_out.txt"

collection_modes:
  perf:
    pmu_count: 4
  bpf:
    metrics:
      - io_latency
  utilization:
    - memory_info
  nvidia:
    gen: 8
    modes:
      - power_time
      - utilization_time
      - memory_basic_time
      - temperature_time
      - clocks_time

perf_counters:
  - cpu-cycles
  - instructions
  - cache-references
  - cache-misses
  - branch-instructions
  - branch-misses

formatter_modes:
  - CSV

iterations: 1
log: true
time_count: 1000
test_name: test_hpc_snap_nvidia
